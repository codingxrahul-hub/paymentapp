<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page.</title>
    <link rel="stylesheet" href="style.css">
    <script src="function.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-icons">
                <span class="back-arrow" style="cursor: pointer;">&#10094;</span>
                <span class="share-icon">&#10150;</span>
            </div>

            <div class="success-icon">
                <div class="circle">
                    <span class="checkmark">&#10003;</span>
                </div>
            </div>

            <p class="status-text">You Paid</p>
            <h1 class="amount">₹0</h1>
            <p class="recipient">to Guest</p>
        </div>

        <div class="details-card">
            <div class="row">
                <span class="label">Received By</span>
                <span class="value">738855312@ybl</span>
            </div>
            <div class="row">
                <span class="label">Payment Mode</span>
                <span class="value">Pocket UPI</span>
            </div>
            <div class="view-more">
                View more details <span class="arrow-down"></span>
            </div>
        </div>

        <div class="offer-banner">
            <div class="banner-content">
                <p class="offer-title">1% Cashback on UPI Spends</p>
                <p class="offer-sub">on FD-Backed First Credit Card</p>
                <button class="avail-btn">Avail Offer</button>
            </div>
            <div class="card-img">
                <div class="mock-card">first</div>
            </div>
        </div>

        <div class="footer">
            <div class="upi_logo">  
                 
            </div>
            <h2 class="mobikwik-logo">MobiKwik</h2>
        </div>
    </div>
</body>
</html>
